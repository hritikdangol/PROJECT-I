<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Registration</title>
    <link rel="stylesheet" href="../css/restaurantsignup.css">
</head>

<body>

    <button class="back-circle" onclick="goBack()">←</button>

    <div class="container">

        <h1>Restaurant Registration</h1>
        <p>Join SaveBites and reduce food waste</p>

        <form onsubmit="signup(event)">

            <label>Restaurant Name</label>
            <input type="text" id="restaurantName" placeholder="Enter Restaurant Name" required>

            <label>Owner Name</label>
            <input type="text" id="ownerName" placeholder="Enter Owner Name" required>

            <label>PAN Number</label>
            <input type="text" id="pan" placeholder="Enter PAN Number" required>

            <label>Email Address</label>
            <input type="email" id="email" placeholder="restaurant@example.com" required>

            <label>Phone Number</label>
            <input type="tel" id="phone" placeholder="98XXXXXXXX" required>

            <label>Restaurant Address</label>
            <input type="text" id="address" placeholder="Enter Address" required>

            <label>Password</label>
            <input type="password" id="password" placeholder="Create Password" required>

            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required>

            <button type="submit">Register Restaurant</button>

        </form>

        <p class="bottom-text">
            Already have an account?
            <a href="restaurantlogin.html">Log In</a>
        </p>

    </div>

    <script src="../js/script.js"></script>
    <script src="../js/signup.js"></script>

</body>

</html>

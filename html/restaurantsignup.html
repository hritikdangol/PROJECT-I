<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Registration</title>
    <link rel="stylesheet" href="../css/restaurant.css">
</head>
<body>
    <button class="back-circle" onclick="goBack()">←</button>
    <script src="../js/script.js"></script>
    </body>
<div class="container">
    <h1>Restaurant Registration</h1>
    <p>Join SaveBites and reduce food waste</p>

    <form>

        <label>Restaurant Name</label>
        <input type="text" placeholder="Enter Restaurant Name" required>

        <label>Owner Name</label>
        <input type="text" placeholder="Enter Owner Name" required>

        <label>PAN Number</label>
        <input type="text" placeholder="Enter PAN Number" required>

        <label>Email Address</label>
        <input type="email" placeholder="restaurant@example.com" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="98XXXXXXXX" required>

        <label>Restaurant Address</label>
        <input type="text" placeholder="Enter Address" required>

        <label>Password</label>
        <input type="password" placeholder="Create Password" required>

        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm Password" required>

        <button type="submit">Register Restaurant</button>

        <p class="bottom-text">
            Already have an account?
            <a href="restaurantlogin.html">Log In</a>
        </p>

    </form>
</div>
</html>

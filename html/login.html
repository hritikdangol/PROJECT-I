<head>
    <link rel="stylesheet" href="../css/login.css">
  </head>
  <body>
    <script src="../js/script.js"></script>
    </body>
<div class="page">
  <h1>Customer Login</h1>
  <p>Log in to your SaveBites account</p>
    <div class="role">
        <button type="button" onclick="goToVolunteerLogin()">Volunteer</button>
        <button type="button" onclick="goToRestaurantLogin()">Restaurant</button>
    </div>
    <div class="form-group">
        <div>Email Address</div>
        <input type="email" placeholder="you@example.com">
        <div>Password</div>
        <input type="password" placeholder="••••••••">
    </div>
    <a class="forgot" href="#">Forgot Password?</a>
    <button class="login-btn" type="submit">Log In</button>
    <div class="bottom-text">
        Don't have an account?
        <button type="button" onclick="goToSignup()">Sign Up</button>
    </div>

</div>

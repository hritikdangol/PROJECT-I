<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <button class="back-circle" onclick="goBack()">←</button>

    <div class="container">

        <div class="left">
            <img src="../asset/login1.png" alt="Login Image">
        </div>

        <div class="right">

            <h1>Customer Login</h1>
            <p>Log in to your SaveBites account</p>

            <div class="role">
                <label>Login as:</label>

                <select onchange="if(this.value) window[this.value]();">
                    <option>Customer</option>
                    <option value="goToVolunteerLogin">Volunteer</option>
                    <option value="goToRestaurantLogin">Restaurant</option>
                </select>
            </div>

            <form onsubmit="login(event,'Customer')">

                <label>Email</label>
                <input type="email" id="email" required>

                <label>Password</label>
                <input type="password" id="password" required>

                <a href="#">Forgot Password?</a>

                <button class="login-btn">
                    Login
                </button>

            </form>
            <p class="bottom-text">
                Don't have an account?
                <button onclick="goToSignup()">Sign Up</button>
            </p>
        </div>
    </div>
    <script src="../js/script.js"></script>
<script src="../js/login.js"></script>
</body>
</html>

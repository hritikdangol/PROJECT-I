<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Login</title>
    <link rel="stylesheet" href="../css/restaurant.css">
</head>

<body>

    <button class="back-circle" onclick="goBack()">←</button>

    <div class="container">

        <div class="left">
            <img src="../asset/login3.png" alt="Restaurant Login">
        </div>

        <div class="right">

            <h1>Restaurant Login</h1>
            <p>Log in to manage your food listings</p>

            <form onsubmit="login(event,'Restaurant')">

                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="restaurant@example.com"
                    required>

                <label>Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter Password"
                    required>

                <a href="#" class="forgot">Forgot Password?</a>

                <button class="login-btn" type="submit">
                    Login
                </button>

            </form>

            <p class="bottom-text">
                Don't have an account?
                <button type="button" onclick="location.href='restaurantsignup.html'">
                    Register
                </button>
            </p>

        </div>

    </div>

    <script src="../js/script.js"></script>
    <script src="../js/login.js"></script>

</body>

</html>
